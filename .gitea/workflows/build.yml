name: Build

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [master, main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-[0-9]+'
  pull_request:
  workflow_dispatch:
    inputs:
      client_server_url:
        description: "Default controlled client Server URL"
        required: false
        default: "https://conductor.moyu.ge"
      client_agent_token:
        description: "Default controlled client Agent Token"
        required: false
        default: "52b737ba238a4c0034e576abf1d853bb28ceda586f396589f3eb730729cfacc1"
      client_agent_name:
        description: "Default controlled client Agent Name"
        required: false
        default: ""
      client_agent_root:
        description: "Default controlled client file root"
        required: false
        default: ""
      client_audio_input:
        description: "Default controlled client audio input"
        required: false
        default: ""
      client_interactive_approval:
        description: "Default controlled client local approval flag: 1/0, true/false, yes/no, on/off"
        required: false
        default: "off"

permissions:
  actions: read
  contents: write

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_HTTP_TIMEOUT: "120"
  CARGO_NET_RETRY: "10"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
  CONDUCTOR_DEFAULT_SERVER_URL: ${{ github.event.inputs.client_server_url || 'https://conductor.moyu.ge' }}
  CONDUCTOR_DEFAULT_AGENT_TOKEN: ${{ github.event.inputs.client_agent_token || '52b737ba238a4c0034e576abf1d853bb28ceda586f396589f3eb730729cfacc1' }}
  CONDUCTOR_DEFAULT_AGENT_NAME: ${{ github.event.inputs.client_agent_name }}
  CONDUCTOR_DEFAULT_AGENT_ROOT: ${{ github.event.inputs.client_agent_root }}
  CONDUCTOR_DEFAULT_AUDIO_INPUT: ${{ github.event.inputs.client_audio_input }}
  CONDUCTOR_DEFAULT_INTERACTIVE_APPROVAL: ${{ github.event.inputs.client_interactive_approval || 'off' }}

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check mirrored workflows
        run: cmp -s .github/workflows/build.yml .gitea/workflows/build.yml

      - name: Check shell scripts parse
        run: bash -n scripts/*.sh

      - name: Check client helper usage
        run: |
          ./scripts/build-client.sh --help
          ./scripts/build-linux-client-deb.sh --help
          ./scripts/install-server.sh --help
          ./scripts/validate-client-evidence.sh --help
          ./scripts/verify-linux-smoke-evidence.sh --help
          ./scripts/verify-macos-smoke-evidence.sh --help

      - name: Test client evidence summary verifier
        run: ./scripts/test-client-evidence-summary.sh

      - name: Test platform smoke evidence verifiers
        run: ./scripts/test-platform-smoke-evidence.sh

      - name: Test client archive checksum verifier
        run: ./scripts/test-client-archive-checksum.sh

      - name: Test client build defaults
        run: ./scripts/test-build-client-defaults.sh

      - name: Test Linux client Debian package
        run: ./scripts/test-linux-client-deb.sh

      - name: Check macOS client metadata
        run: python3 scripts/check-macos-client-metadata.py

  powershell-static-checks:
    name: PowerShell static checks
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check PowerShell scripts parse
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path scripts -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref] $tokens, [ref] $errors) | Out-Null
            if ($errors.Count -gt 0) {
              $messages = $errors | ForEach-Object { "$($_.Extent.File):$($_.Extent.StartLineNumber):$($_.Message)" }
              throw ($messages -join [Environment]::NewLine)
            }
            Write-Host "PowerShell syntax ok: $($_.FullName)"
          }

      - name: Test Windows client archive checksum verifier
        shell: pwsh
        run: .\scripts\test-windows-client-archive-checksum.ps1

      - name: Test Windows smoke evidence verifier
        shell: pwsh
        run: .\scripts\test-windows-smoke-evidence.ps1

      - name: Test Windows client build defaults
        shell: pwsh
        run: .\scripts\test-windows-build-client-defaults.ps1

      - name: Test Windows live process logging
        shell: pwsh
        run: .\scripts\test-windows-process-logging.ps1

  server-release:
    name: Server release package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-rust-${{ hashFiles('Cargo.lock', '**/Cargo.toml', '**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-rust-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web assets for Rust embed
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Run Rust tests
        run: cargo test

      - name: Build server release package
        run: ./scripts/build-release.sh x86_64-unknown-linux-gnu

      - name: Upload server release package
        uses: actions/upload-artifact@v7
        with:
          name: conductor-server-linux-x64
          path: |
            release/conductor-x86_64-unknown-linux-gnu.tar.gz
            release/conductor-x86_64-unknown-linux-gnu.tar.gz.sha256
          if-no-files-found: error

  client-linux:
    name: Linux controlled client
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev xvfb ffmpeg

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-rust-${{ hashFiles('Cargo.lock', '**/Cargo.toml', '**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-rust-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Check Flutter client
        working-directory: client
        run: |
          flutter config --enable-linux-desktop
          flutter analyze
          flutter test

      - name: Build Linux client
        run: FLUTTER_BIN="$(command -v flutter)" ./scripts/build-client.sh

      - name: Build Linux smoke server
        run: |
          npm --prefix web ci
          npm --prefix web run build
          cargo build -p conductor-server

      - name: Validate Linux client flow
        run: ./scripts/validate-linux-client.sh --skip-client-build --skip-server-build --evidence-dir artifacts/linux-client-smoke --require-ci-fields --expected-commit "$GITHUB_SHA"

      - name: Upload Linux smoke evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-client-smoke-evidence
          path: artifacts/linux-client-smoke
          if-no-files-found: ignore

      - name: Upload Linux client
        uses: actions/upload-artifact@v7
        with:
          name: conductor-client-linux-x64
          path: |
            release/conductor-client-linux-x64.tar.gz
            release/conductor-client-linux-x64.tar.gz.sha256
            release/conductor-client-linux-amd64.deb
            release/conductor-client-linux-amd64.deb.sha256
          if-no-files-found: error

  client-windows:
    name: Windows controlled client
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-rust-${{ hashFiles('Cargo.lock', '**/Cargo.toml', '**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-rust-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install FFmpeg tools
        shell: pwsh
        run: |
          choco install ffmpeg --yes --no-progress
          $ffmpeg = Get-ChildItem "$env:ChocolateyInstall\lib\ffmpeg*\tools" -Recurse -Filter ffmpeg.exe |
            Where-Object { $_.FullName -match '[\\/]bin[\\/]ffmpeg\.exe$' } |
            Select-Object -First 1
          $ffplay = Get-ChildItem "$env:ChocolateyInstall\lib\ffmpeg*\tools" -Recurse -Filter ffplay.exe |
            Where-Object { $_.FullName -match '[\\/]bin[\\/]ffplay\.exe$' } |
            Select-Object -First 1
          if ($null -eq $ffmpeg -or $null -eq $ffplay) {
            throw "Chocolatey FFmpeg package did not contain ffmpeg.exe and ffplay.exe."
          }
          "FFMPEG_BIN=$($ffmpeg.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FFPLAY_BIN=$($ffplay.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build web assets for server smoke
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Build Windows smoke server
        shell: pwsh
        run: |
          $maxAttempts = 4
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            cargo build -p conductor-server
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq $maxAttempts) {
              throw "cargo build failed after $maxAttempts attempts."
            }
            $delaySeconds = 15 * $attempt
            Write-Warning "cargo build attempt $attempt failed; retrying in $delaySeconds seconds."
            Start-Sleep -Seconds $delaySeconds
          }

      - name: Build Windows client
        shell: pwsh
        run: |
          $env:FLUTTER_BIN = (Get-Command flutter).Source
          & .\scripts\build-client.ps1

      - name: Validate Windows client flow
        shell: pwsh
        run: .\scripts\validate-windows-client.ps1 -SkipClientBuild -SkipServerBuild -EvidenceDir artifacts\windows-client-smoke -RequireCiFields -ExpectedCommit $env:GITHUB_SHA

      - name: Upload Windows smoke evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-client-smoke-evidence
          path: artifacts/windows-client-smoke
          if-no-files-found: ignore

      - name: Upload Windows client
        uses: actions/upload-artifact@v7
        with:
          name: conductor-client-windows-x64
          path: |
            release/conductor-client-windows-x64.zip
            release/conductor-client-windows-x64.zip.sha256
          if-no-files-found: error

  client-macos:
    name: macOS controlled client
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-rust-${{ hashFiles('Cargo.lock', '**/Cargo.toml', '**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-rust-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install FFmpeg tools
        run: brew install ffmpeg

      - name: Build macOS client
        run: |
          flutter config --enable-macos-desktop
          FLUTTER_BIN="$(command -v flutter)" ./scripts/build-client.sh

      - name: Build macOS smoke server
        run: |
          npm --prefix web ci
          npm --prefix web run build
          cargo build -p conductor-server

      - name: Validate macOS client flow
        run: ./scripts/validate-macos-client.sh --skip-client-build --skip-server-build --evidence-dir artifacts/macos-client-smoke --require-ci-fields --expected-commit "$GITHUB_SHA"

      - name: Upload macOS smoke evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macos-client-smoke-evidence
          path: artifacts/macos-client-smoke
          if-no-files-found: ignore

      - name: Upload macOS client
        uses: actions/upload-artifact@v7
        with:
          name: conductor-client-macos
          path: |
            release/conductor-client-macos.tar.gz
            release/conductor-client-macos.tar.gz.sha256
          if-no-files-found: error

  client-smoke-evidence:
    name: Client smoke evidence
    runs-on: ubuntu-24.04
    needs:
      - client-linux
      - client-windows
      - client-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Linux smoke evidence
        uses: actions/download-artifact@v8
        with:
          name: linux-client-smoke-evidence
          path: artifacts/linux-client-smoke-evidence

      - name: Download Windows smoke evidence
        uses: actions/download-artifact@v8
        with:
          name: windows-client-smoke-evidence
          path: artifacts/windows-client-smoke-evidence

      - name: Download macOS smoke evidence
        uses: actions/download-artifact@v8
        with:
          name: macos-client-smoke-evidence
          path: artifacts/macos-client-smoke-evidence

      - name: Verify client smoke evidence
        run: ./scripts/validate-client-evidence.sh --require-ci-fields --expected-commit "$GITHUB_SHA" --write-summary artifacts/client-smoke-evidence-verified

      - name: Upload verified client smoke evidence
        uses: actions/upload-artifact@v7
        with:
          name: client-smoke-evidence-verified
          path: |
            artifacts/client-smoke-evidence-verified
            artifacts/linux-client-smoke-evidence
            artifacts/windows-client-smoke-evidence
            artifacts/macos-client-smoke-evidence
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - server-release
      - client-linux
      - client-windows
      - client-macos
      - client-smoke-evidence
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.sha256' \) | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets found in downloaded artifacts." >&2
            exit 1
          fi
          delete_existing_assets() {
            local tag="$1"
            shift
            local file name
            for file in "$@"; do
              name="$(basename "$file")"
              gh release delete-asset "$tag" "$name" --yes >/dev/null 2>&1 || true
            done
          }

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            tag="nightly"
            title="Conductor Nightly"
            notes="Nightly build from ${GITHUB_SHA}."
            gh release delete "$tag" --yes --cleanup-tag || true
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -f "$tag" "$GITHUB_SHA"
            git push origin -f "refs/tags/$tag"
            gh release create "$tag" "${files[@]}" --title "$title" --notes "$notes" --prerelease
          else
            tag="${GITHUB_REF_NAME}"
            title="Conductor ${GITHUB_REF_NAME}"
            notes="Release build from ${GITHUB_SHA}."
            if gh release view "$tag" >/dev/null 2>&1; then
              delete_existing_assets "$tag" "${files[@]}"
              gh release upload "$tag" "${files[@]}" --clobber
            else
              gh release create "$tag" "${files[@]}" --title "$title" --notes "$notes"
            fi
          fi
